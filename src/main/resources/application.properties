# ========================================
# APPLICATION
# ========================================
spring.application.name=webhook-engine
server.port=${PORT:8080}

# ========================================
# R2DBC POSTGRESQL
# ========================================
spring.r2dbc.url=r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:webhook_db}
spring.r2dbc.username=${DB_USER:postgres}
spring.r2dbc.password=${DB_PASSWORD:root}
spring.r2dbc.pool.enabled=true
spring.r2dbc.pool.initial-size=5
spring.r2dbc.pool.max-size=10
spring.r2dbc.pool.max-idle-time=30m

# ========================================
# INITIALISATION SCHEMA SQL
# ========================================
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# ========================================
# WEBCLIENT (pour livraison des webhooks)
# ========================================
spring.codec.max-in-memory-size=10MB

# ========================================
# RETRY CONFIGURATION
# ========================================
webhook.delivery.max-attempts=3
webhook.delivery.retry-delay-seconds=30

# ========================================
# SWAGGER
# ========================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true

# ========================================
# LOGS
# ========================================
logging.level.root=INFO
logging.level.com.webhook.engine=DEBUG
logging.level.org.springframework.r2dbc=DEBUG